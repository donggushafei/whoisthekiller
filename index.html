const phasesOrder = ["階段一", "階段二", "階段三", "階段四"];

// 從 localStorage 載入已儲存的密碼集合
function getUnlockedKeys() {
    const stored = localStorage.getItem('unlockedClues');
    return stored ? JSON.parse(stored) : [];
}

// 儲存密碼集合至 localStorage
function saveUnlockedKeys(keys) {
    localStorage.setItem('unlockedClues', JSON.stringify(keys));
}

// 解鎖邏輯
function unlockClue() {
    const input = document.getElementById('pwdInput');
    const msg = document.getElementById('message');
    const pwd = input.value.trim();

    if (!pwd) {
        msg.textContent = "請輸入密碼！";
        msg.className = "message error";
        return;
    }

    if (cluesDatabase[pwd]) {
        let unlockedKeys = getUnlockedKeys();
        if (!unlockedKeys.includes(pwd)) {
            unlockedKeys.push(pwd);
            saveUnlockedKeys(unlockedKeys);
            msg.textContent = "解鎖成功！線索已記錄至下方。";
            msg.className = "message success";
            renderClues();
        } else {
            msg.textContent = "該線索先前已經解鎖過了！";
            msg.className = "message success";
        }
        input.value = "";
    } else {
        msg.textContent = "密碼錯誤，請重新確認。";
        msg.className = "message error";
    }
}

// 畫面渲染邏輯
function renderClues() {
    const container = document.getElementById('cluesContainer');
    container.innerHTML = "";
    const unlockedKeys = getUnlockedKeys();

    phasesOrder.forEach(phase => {
        // 建立階段外殼
        const phaseGroup = document.createElement('div');
        phaseGroup.className = 'phase-group';

        const phaseTitle = document.createElement('div');
        phaseTitle.className = 'phase-title';
        phaseTitle.textContent = phase;
        phaseGroup.appendChild(phaseTitle);

        const clueList = document.createElement('div');
        clueList.className = 'clue-list';

        // 篩選屬於該階段且已解鎖的線索
        const matchedKeys = unlockedKeys.filter(key => {
            return cluesDatabase[key] && cluesDatabase[key].phase.startsWith(phase);
        });

        if (matchedKeys.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.className = 'empty-phase-msg';
            emptyMsg.textContent = "尚無已解鎖的線索...";
            clueList.appendChild(emptyMsg);
        } else {
            matchedKeys.forEach(key => {
                const clueData = cluesDatabase[key];
                const clueItem = document.createElement('div');
                clueItem.className = 'clue-item';

                const clueHeader = document.createElement('div');
                clueHeader.className = 'clue-header';
                clueHeader.innerHTML = `<span>${clueData.title}</span><span class="toggle-icon">▼</span>`;

                const clueBody = document.createElement('div');
                clueBody.className = 'clue-body';
                clueBody.innerHTML = clueData.content;

                // 點擊展開/收合
                clueHeader.addEventListener('click', () => {
                    clueItem.classList.toggle('open');
                    const icon = clueHeader.querySelector('.toggle-icon');
                    icon.textContent = clueItem.classList.contains('open') ? '▲' : '▼';
                });

                clueItem.appendChild(clueHeader);
                clueItem.appendChild(clueBody);
                clueList.appendChild(clueItem);
            });
        }

        phaseGroup.appendChild(clueList);
        container.appendChild(phaseGroup);
    });
}

// Enter 鍵觸發解鎖
document.getElementById('pwdInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        unlockClue();
    }
});

// 網頁載入時自動渲染
window.onload = function() {
    renderClues();
};
</script>
