            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
            margin-bottom: 20px;
        }

        .clue-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clue-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fdfbf7;
            transition: background-color 0.2s;

            background-color: #f4efe6;
        }

            border-top: 1px dashed var(--border-color);
            display: none;
            white-space: pre-wrap;
            background-color: #ffffff;
        }

            display: block;
        }

        .toggle-icon {
            font-size: 0.9rem;
            color: #777;
        }

        .empty-phase-msg {
            color: #888;
            font-style: italic;
            font-size: 0.95rem;
            padding-left: 15px;

const phasesOrder = ["階段一", "階段二", "階段三", "階段四"];

// 渲染公開基礎檔案
function renderPublicInfo() {
    const container = document.getElementById('publicInfoContainer');
    container.innerHTML = "";

    publicInfoDatabase.forEach((item) => {
        const infoItem = document.createElement('div');
        infoItem.className = 'clue-item';

        const infoHeader = document.createElement('div');
        infoHeader.className = 'clue-header';
        infoHeader.innerHTML = `<span>${item.title}</span><span class="toggle-icon">▼</span>`;

        const infoBody = document.createElement('div');
        infoBody.className = 'clue-body';
        infoBody.innerHTML = item.content;

        infoHeader.addEventListener('click', () => {
            infoItem.classList.toggle('open');
            const icon = infoHeader.querySelector('.toggle-icon');
            icon.textContent = infoItem.classList.contains('open') ? '▲' : '▼';
        });

        infoItem.appendChild(infoHeader);
        infoItem.appendChild(infoBody);
        container.appendChild(infoItem);
    });
}

// 從 localStorage 載入已解鎖密碼
function getUnlockedKeys() {
    const stored = localStorage.getItem('unlockedClues');
    return stored ? JSON.parse(stored) : [];
}

// 儲存密碼至 localStorage
function saveUnlockedKeys(keys) {
    localStorage.setItem('unlockedClues', JSON.stringify(keys));
}

// 解鎖動作
function unlockClue() {
    const input = document.getElementById('pwdInput');
    const msg = document.getElementById('message');
    const pwd = input.value.trim();

    if (!pwd) {
        msg.textContent = "請輸入密碼！";
        msg.className = "message error";
        return;
    }

    if (cluesDatabase[pwd]) {
        let unlockedKeys = getUnlockedKeys();
        if (!unlockedKeys.includes(pwd)) {
            unlockedKeys.push(pwd);
            saveUnlockedKeys(unlockedKeys);
            msg.textContent = "解鎖成功！線索已加入下方。";
            msg.className = "message success";
            renderClues();
        } else {
            msg.textContent = "該線索先前已經解鎖過了！";
            msg.className = "message success";
        }
        input.value = "";
    } else {
        msg.textContent = "密碼錯誤，請重新確認。";
        msg.className = "message error";
    }
}

// 渲染階段線索區
function renderClues() {
    const container = document.getElementById('cluesContainer');
    container.innerHTML = "";
    const unlockedKeys = getUnlockedKeys();

    phasesOrder.forEach(phase => {
        const phaseGroup = document.createElement('div');
        phaseGroup.className = 'phase-group';

        const phaseTitle = document.createElement('div');
        phaseTitle.className = 'phase-title';
        phaseTitle.textContent = phase;
        phaseGroup.appendChild(phaseTitle);

        const clueList = document.createElement('div');
        clueList.className = 'clue-list';

        // 階段一：額外放入預設直接顯示的公開線索
        if (phase === "階段一") {
            defaultPhase1Clues.forEach(clueData => {
                const clueItem = document.createElement('div');
                clueItem.className = 'clue-item';

                const clueHeader = document.createElement('div');
                clueHeader.className = 'clue-header';
                clueHeader.innerHTML = `<span>${clueData.title}</span><span class="toggle-icon">▼</span>`;

                const clueBody = document.createElement('div');
                clueBody.className = 'clue-body';
                clueBody.innerHTML = clueData.content;

                clueHeader.addEventListener('click', () => {
                    clueItem.classList.toggle('open');
                    const icon = clueHeader.querySelector('.toggle-icon');
                    icon.textContent = clueItem.classList.contains('open') ? '▲' : '▼';
                });

                clueItem.appendChild(clueHeader);
                clueItem.appendChild(clueBody);
                clueList.appendChild(clueItem);
            });
        }

        // 搜尋此階段被密碼解鎖的項目
        const matchedKeys = unlockedKeys.filter(key => {
            return cluesDatabase[key] && cluesDatabase[key].phase.startsWith(phase);
        });

        if (phase !== "階段一" && matchedKeys.length === 0) {
            const emptyMsg = document.createElement('div');
            emptyMsg.className = 'empty-phase-msg';
            emptyMsg.textContent = "尚無已解鎖的線索...";
            clueList.appendChild(emptyMsg);
        } else {
            matchedKeys.forEach(key => {
                const clueData = cluesDatabase[key];
                const clueItem = document.createElement('div');
                clueItem.className = 'clue-item';

                const clueHeader = document.createElement('div');
                clueHeader.className = 'clue-header';
                clueHeader.innerHTML = `<span>${clueData.title}</span><span class="toggle-icon">▼</span>`;

                const clueBody = document.createElement('div');
                clueBody.className = 'clue-body';
                clueBody.innerHTML = clueData.content;

                clueHeader.addEventListener('click', () => {
                    clueItem.classList.toggle('open');
                    const icon = clueHeader.querySelector('.toggle-icon');
                    icon.textContent = clueItem.classList.contains('open') ? '▲' : '▼';
                });

                clueItem.appendChild(clueHeader);
                clueItem.appendChild(clueBody);
                clueList.appendChild(clueItem);
            });
        }

        phaseGroup.appendChild(clueList);
        container.appendChild(phaseGroup);
    });
}

// 綁定 Enter 鍵
document.getElementById('pwdInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        unlockClue();
    }
});

// 頁面載入初始化
window.onload = function() {
    renderPublicInfo();
    renderClues();
};
</script>
