<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部落疑雲：東谷調查隊系統</title>
    <style>
        /* 基礎設定 & 復古未來主義色彩 */
        :root {
            --bg-color: #0d0b11;
            --card-bg: #1a1625;
            --primary: #ff6b35; /* 暖橘 */
            --secondary: #9b5de5; /* 迷幻紫 */
            --accent: #f7b731; /* 夕陽黃 */
            --text-main: #f4f4f6;
            --text-muted: #a09cb0;
            --border: #322b43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 10%, #251b35 0%, var(--bg-color) 70%);
        }

        /* 動態背景粒子微光效果 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 107, 53, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(155, 93, 229, 0.08) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* 歡迎 / 登入畫面 */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 40px;
            animation: pulse 3s infinite alternate;
        }

        .logo-title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .input-group {
            width: 100%;
            max-width: 320px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0d0b11;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(255, 107, 53, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary), #ff8243);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 主系統畫面 (預設隱藏) */
        #main-system {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        /* 頂部進度儀表板 */
        .dashboard {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .team-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .team-name-tag {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .progress-container {
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            height: 8px;
            background: #0d0b11;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 25%; /* 初始進度 */
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 4px;
            transition: width 0.5s ease-in-out;
        }

        /* 其他小隊即時動態 */
        .other-teams {
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: 10px;
        }

        .other-team-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .status-badge {
            padding: 1px 6px;
            border-radius: 4px;
            background: #2a243a;
            color: var(--text-main);
        }

        .status-badge.updating {
            background: rgba(155, 93, 229, 0.2);
            color: #b388ff;
        }

        /* 頁籤導覽列 (底部固定，方便單手操作) */
        .tab-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(26, 22, 37, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .tab-button {
            flex: 1;
            padding: 12px 0;
            background: none;
            box-shadow: none;
            border-radius: 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-button.active {
            color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
        }

        .tab-button span.icon {
            font-size: 1.2rem;
        }

        /* 區塊內容控制 */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            padding-left: 8px;
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        /* 故事概述樣式 */
        .story-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #dbdaf0;
            text-align: justify;
        }
        
        .highlight {
            color: var(--accent);
            font-weight: bold;
        }

        /* 角色關係圖模擬樣式 */
        .relation-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .avatar-card {
            background: #221c30;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: transform 0.2s;
        }

        .avatar-card:active {
            transform: scale(0.95);
        }

        .avatar-placeholder {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background: #3c3256;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.2);
        }

        .avatar-placeholder.dead {
            border-color: #777;
            filter: grayscale(100%);
        }

        .avatar-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .avatar-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* 階段與解鎖線索區塊 */
        .stage-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stage-btn {
            padding: 10px 0;
            background: #221c30;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            font-size: 0.85rem;
            box-shadow: none;
        }

        .stage-btn.selected {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(155, 93, 229, 0.3);
        }

        .clue-input-box {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, var(--card-bg) 0%, #13101c 100%);
